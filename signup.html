<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>GroChef Signup</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
                rgba(0,0,0,0.5),
                rgba(0,0,0,0.5)
            ),

            url('/static/images/signup_bg.jpg');

            background-size:cover;
            background-position:center;

        }

        .signup-box{

            width:420px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(12px);

            border-radius:25px;

            padding:45px;

            color:white;

            box-shadow:0px 8px 30px rgba(0,0,0,0.3);

            animation:fadeIn 1s ease;

        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(30px);
            }

            to{
                opacity:1;
                transform:translateY(0px);
            }

        }

        .logo{

            text-align:center;
            font-size:55px;
            margin-bottom:10px;

        }

        h1{

            text-align:center;
            margin-bottom:10px;
            font-size:35px;

        }

        .subtitle{

            text-align:center;
            color:#ddd;
            margin-bottom:30px;

        }

        .input-box{

            margin-top:20px;

        }

        .input-box input{

            width:100%;

            padding:15px;

            border:none;

            border-radius:12px;

            outline:none;

            font-size:16px;

            background:rgba(255,255,255,0.2);

            color:white;

        }

        .input-box input::placeholder{

            color:#eee;

        }

        .signup-btn{

            width:100%;

            padding:15px;

            margin-top:30px;

            border:none;

            border-radius:12px;

            background:linear-gradient(
                to right,
                #ff9966,
                #ff5e62
            );

            color:white;

            font-size:18px;

            cursor:pointer;

            transition:0.3s;

        }

        .signup-btn:hover{

            transform:scale(1.03);

        }

        .bottom{

            text-align:center;
            margin-top:25px;

        }

        .bottom a{

            color:#fff;
            text-decoration:none;
            font-weight:bold;

        }

    </style>

</head>

<body>

    <div class="signup-box">

        <div class="logo">

            ✨

        </div>

        <h1>Create Account</h1>

        <p class="subtitle">

            Join GroChef Today

        </p>

        <form action="/create_account"
              method="POST">

            <div class="input-box">

                <input type="text"
                       name="username"
                       placeholder="Enter Username"
                       required>

            </div>

            <div class="input-box">

                <input type="password"
                       name="password"
                       placeholder="Enter Password"
                       required>

            </div>

            <button class="signup-btn"
                    type="submit">

                Signup 🚀

            </button>

        </form>

        <div class="bottom">

            Already have account?

            <a href="/">

                Login

            </a>

        </div>

    </div>

</body>

</html>
